server:
  port: ${SERVER_PORT:8080}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:classpath:application-local.yml
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-strong-secret-key-with-at-least-32-chars}
    access-token-expire-seconds: ${JWT_ACCESS_EXPIRE_SECONDS:1800}
    refresh-token-expire-seconds: ${JWT_REFRESH_EXPIRE_SECONDS:604800}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
